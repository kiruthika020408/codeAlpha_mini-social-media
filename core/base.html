<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/logo.svg" type="image/svg+xml">
    <title>Mini Connect</title>
    <style>
        :root { --bg:#f4f6fb; --card:#fff; --text:#111827; --muted:#64748b; --accent:#f43f5e; --accent-2:#2563eb; }
        * { box-sizing:border-box; }
        body { font-family: Arial, sans-serif; margin:0; background:var(--bg); color:var(--text); }
        .container { max-width: 900px; margin: 0 auto 90px; padding: 1rem; }
        .card { background:var(--card); border-radius:18px; padding:1rem; margin-bottom:1rem; box-shadow:0 8px 20px rgba(15,23,42,0.06); }
        .topbar { display:flex; justify-content:space-between; align-items:center; padding:1rem 1rem 0.5rem; }
        .brand { font-size:1.2rem; font-weight:700; }
        .btn { display:inline-block; padding:0.65rem 1rem; border:none; border-radius:999px; cursor:pointer; background:var(--accent); color:white; text-decoration:none; }
        .btn.secondary { background:#e2e8f0; color:#0f172a; }
        .muted { color:var(--muted); }
        .row { display:flex; justify-content:space-between; align-items:center; gap:0.75rem; }
        .stack { display:grid; gap:0.75rem; }
        .pill { display:inline-block; padding:0.3rem 0.6rem; border-radius:999px; background:#fee2e2; color:#b91c1c; margin-right:0.3rem; }
        .avatar { width:44px; height:44px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--accent-2)); color:white; display:grid; place-items:center; font-weight:700; }
        form input, form textarea, form select { width:100%; padding:0.75rem; margin-bottom:0.7rem; border:1px solid #dbe2ea; border-radius:12px; box-sizing:border-box; }
        .post-image { width:100%; border-radius:14px; margin-top:0.6rem; }
        .bottom-nav { position:fixed; left:0; right:0; bottom:0; display:flex; justify-content:space-around; padding:0.75rem 1rem; background:white; border-top:1px solid #e5e7eb; }
        .bottom-nav a { text-decoration:none; color:var(--muted); font-size:0.95rem; }
        .bottom-nav a.active { color:var(--accent); font-weight:700; }
        .profile-hero { display:flex; align-items:center; gap:1rem; margin-bottom:1rem; }
        .stats { display:flex; gap:1rem; margin-top:0.4rem; }
        .friend-item { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.6rem; }
        .small { font-size:0.9rem; }
    </style>
</head>
<body>
<div class="topbar">
    <div class="brand" style="display:flex; align-items:center; gap:0.6rem;">
        <img src="/static/logo.svg" alt="Mini Connect logo" style="width:34px; height:34px; border-radius:10px;">
        <span>Mini Connect</span>
    </div>
    <div>
        {% if user.is_authenticated %}
            <a class="btn secondary" href="{% url 'logout' %}">Logout</a>
        {% endif %}
    </div>
</div>
<div class="container">
    {% block content %}{% endblock %}
</div>
{% if user.is_authenticated %}
<div class="bottom-nav">
    <a href="{% url 'home' %}" class="{% if request.resolver_match.url_name == 'home' %}active{% endif %}">Post</a>
    <a href="{% url 'friends' %}" class="{% if request.resolver_match.url_name == 'friends' %}active{% endif %}">Friends</a>
    <a href="{% url 'profile' user.username %}" class="{% if request.resolver_match.url_name == 'profile' %}active{% endif %}">Profile</a>
</div>
{% endif %}
</body>
</html>
